<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>

<body class="pelicula-page">
    <header class="top-bar">
        <img src="../../img/User.png" alt="Perfil" class="icono-perfil" />
        <img src="../../img/logo.png" alt="Logo Cine Lens" class="logo" />
        <div class="barra-busqueda">
            <input type="text" placeholder="Buscar..." />
        </div>
        <nav class="menu-superior">
            <a href="../../index.html" class="menu-link">Inicio</a>
            <a href="../../pages/catalogo.html" class="menu-link">Catalogo</a>
            <a href="../../pages/lista-comentarios.html" class="menu-link">Comentarios</a>
            <div class="barra-busqueda-nav">
                <input type="text" placeholder="Buscar..." />
                <button class="btn-buscar"><img src="../../img/busqueda-de-lupa.png" alt="Buscar"></button>
            </div>
        </nav>
        <div class="usuario-menu">
            <img src="../../img/User.png" alt="Perfil" class="icono-perfil-nav" />
            <span class="usuario-nombre">Usuario</span>
            <img src="../../img/flecha-correcta.png" alt="Desplegar" class="flecha-usuario" />
        </div>
    </header>

    <main class="entradas-page">
        <section class="movie-info-section-butacas">
            <div class="movie-poster-container-butacas">
                <img src="" alt="" class="movie-poster-butacas">
            </div>
            <div class="movie-metadata-butacas">
                <p class="movie-genre-butacas"></p> 
                <p class="movie-synopsis-butacas"></p>
            </div>
        </section>
        

        <section class="compra-entradas">
            <h1 class="movie-title-butacas"></h1>
            <svg class="pantalla-cine" viewBox="0 0 319 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M7.29742 15C6.70078 15 6.13934 14.7247 5.77599 14.2539L3.7008 11.5651C2.76313 10.3502 3.46001 8.58431 4.98957 8.39741C18.8926 6.69849 74.6484 0.606465 157.397 0.869684C202.894 1.01441 254.962 3.658 313.347 8.68218C314.952 8.8203 315.732 10.705 314.697 11.9469L312.736 14.2986C312.365 14.7428 311.817 15 311.241 15L7.29742 15Z"
                    fill="#222222"></path>
                <path
                    d="M4.08767 12.3643C3.05435 12.4761 2.84608 13.8907 3.80678 14.2788L28.9715 24.4462C29.1387 24.5138 29.3133 24.5359 29.4923 24.5092C34.7903 23.7181 119.512 11.6812 289.929 24.1612C290.078 24.1722 290.232 24.1497 290.372 24.0949L314.674 14.5699C315.646 14.189 315.478 12.7841 314.443 12.6761C289.274 10.0482 148.249 -3.23927 4.08767 12.3643Z"
                    fill="url(#paint0_linear_1_3)"></path>
                <defs>
                    <linearGradient id="paint0_linear_1_3" x1="159.279" y1="4.23901" x2="159.249" y2="29"
                        gradientUnits="userSpaceOnUse">
                        <stop stop-color="#555555"></stop>
                        <stop offset="1" stop-color="#181818"></stop>
                    </linearGradient>
                </defs>
            </svg>
            <h1 class="title-pantalla">PANTALLA</h1>
            <div class="sala-cine">
                <div class="letras-filas">
                    <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span><span>H</span><span>I</span><span>J</span>
                </div>
                <div class="butacas-grid"></div>
            </div>
            <div class="leyenda-butacas">
                <span><span class="butaca disponible"></span> Disponible</span>
                <span><span class="butaca seleccionado"></span> Seleccionado</span>
                <span><span class="butaca ocupado"></span> Ocupado</span>
            </div>
            <div class="butacas-seleccionadas">
                <span class="butacas-texto">Ninguna Seleccionada</span>
            </div>
            <button class="btn-comprar-entradas">Comprar Entradas</button>
            <button class="btn-borrar-seleccion">Borrar Selección</button>
            <button class="btn-volver-atras">Volver Atrás</button>
        </section>
    </main>

    <nav class="menu-inferior">
        <a href="../index.html"><button> <img src="../../img/casa.png" alt="casa-index"></button></a>

        <a href="../pages/lista-comentarios.html"><button> <img src="../../img/msj.png" alt=""></button></a>
    </nav>
